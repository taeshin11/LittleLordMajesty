name: Build WebGL & Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. 코드 구조 검증 (secrets 없이도 항상 실행) ──────────────
  validate:
    name: Validate Code Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C# files compile (syntax only)
        run: |
          echo "=== Script count ==="
          find Assets/Scripts -name "*.cs" | wc -l
          echo "=== Checking for obvious syntax errors ==="
          # Check for unclosed braces (rough check)
          for f in $(find Assets/Scripts -name "*.cs"); do
            opens=$(grep -o '{' "$f" | wc -l)
            closes=$(grep -o '}' "$f" | wc -l)
            if [ "$opens" != "$closes" ]; then
              echo "WARNING: Brace mismatch in $f (open=$opens close=$closes)"
            fi
          done
          echo "=== Localization JSON validation ==="
          for f in $(find Assets/Resources/Localization -name "*.json"); do
            python3 -c "import json,sys; json.load(open('$f'))" && echo "OK: $f" || echo "INVALID: $f"
          done
          echo "=== Validation complete ==="

      - name: Check for accidental API key commits
        run: |
          # Make sure no API keys slipped in
          if grep -r "AIzaSy" Assets/Scripts/ 2>/dev/null; then
            echo "ERROR: API key found in Scripts!"
            exit 1
          fi
          echo "No API keys found in scripts. Safe to proceed."

  # ── 2. Unity WebGL 빌드 (secrets 필요) ────────────────────────
  build-webgl:
    name: Build WebGL
    runs-on: ubuntu-latest
    needs: validate
    # secrets가 설정됐을 때만 실행
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (vars.UNITY_BUILD_ENABLED == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          # Personal license: only email+password needed (no serial/ulf required)
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform:    WebGL
          unityVersion:      2022.3.62f1
          buildsPath:        Builds
          buildName:         LittleLordMajesty
          allowDirtyBuild:   true

      - name: Prepare Pages
        run: |
          mkdir -p pages
          cp -r Builds/WebGL/LittleLordMajesty/. pages/
          find pages/Build -name "*.gz" -exec bash -c 'mv "$1" "${1%.gz}"' _ {} \; 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          force_orphan: true

      - name: Upload WebGL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebGL-Build
          path: Builds/WebGL/
          retention-days: 14

  # ── 3. Android APK 빌드 (secrets 필요) ────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (vars.UNITY_BUILD_ENABLED == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Android-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform:    Android
          unityVersion:      2022.3.62f1
          buildsPath:        Builds
          buildName:         LittleLordMajesty
          allowDirtyBuild:   true
          androidExportType: androidPackage

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: Builds/Android/
          retention-days: 14

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Builds/Android/*.apk
