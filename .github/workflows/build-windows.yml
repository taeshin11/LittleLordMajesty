name: Build Windows & Upload to Steam

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  validate:
    name: Validate Code Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check C# files
        run: |
          echo "=== Script count ===" && find Assets/Scripts -name "*.cs" | wc -l
          echo "=== API key check ==="
          if grep -r "AIzaSy" Assets/Scripts/ 2>/dev/null; then
            echo "ERROR: API key in scripts!"; exit 1
          fi
          echo "Clean."

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (vars.UNITY_BUILD_ENABLED == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Windows-
            Library-

      - name: Build Windows
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform:    StandaloneWindows64
          unityVersion:      2022.3.62f1
          buildsPath:        Builds
          buildName:         LittleLordMajesty
          allowDirtyBuild:   true

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: Builds/StandaloneWindows64/
          retention-days: 14

      - name: Create GitHub Release (on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Builds/StandaloneWindows64/**
          draft: true
          prerelease: true
          generate_release_notes: true
